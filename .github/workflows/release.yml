name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Write d3plugin.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "{\"name\":\"Media Sequencer\",\"version\":\"$VERSION\",\"entry\":\"index.html\"}" \
            > dist/d3plugin.json

      - name: Zip dist folder
        run: cd dist && zip -r "../Media Sequencer.zip" .

      - name: Create release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: "Media Sequencer.zip"
